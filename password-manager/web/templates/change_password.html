{% extends "base.html" %}
{% block title %}修改主密码 - 密码管理器{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5 col-lg-4">
            <h3 class="mb-3"><i class="bi bi-key-fill"></i> 修改主密码</h3>

            <div class="alert alert-info small">
                <i class="bi bi-info-circle"></i>
                修改主密码后，所有已存储的密码将<b>自动使用新密码重加密</b>，无需手动操作。
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('change_password') }}">
                        <div class="mb-3">
                            <label for="current" class="form-label fw-semibold">当前主密码</label>
                            <input type="password" class="form-control form-control-lg"
                                   id="current" name="current"
                                   placeholder="输入当前主密码"
                                   required autofocus>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label for="new" class="form-label fw-semibold">新主密码</label>
                            <input type="password" class="form-control form-control-lg"
                                   id="new" name="new"
                                   placeholder="至少6个字符"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="confirm" class="form-label fw-semibold">确认新密码</label>
                            <input type="password" class="form-control form-control-lg"
                                   id="confirm" name="confirm"
                                   placeholder="再次输入新密码"
                                   required
                                   oninput="checkMatch()">
                            <div class="mt-1" id="match-indicator"></div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-lg">
                                取消
                            </a>
                            <button type="submit" class="btn btn-warning btn-lg px-4">
                                <i class="bi bi-arrow-repeat"></i> 确认修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function checkMatch() {
    const pwd = document.getElementById('new').value;
    const confirm = document.getElementById('confirm').value;
    const div = document.getElementById('match-indicator');
    if (!confirm) { div.innerHTML = ''; return; }
    if (pwd === confirm) {
        div.innerHTML = '<small class="text-success">✅ 密码一致</small>';
    } else {
        div.innerHTML = '<small class="text-danger">❌ 密码不一致</small>';
    }
}
</script>
{% endblock %}
